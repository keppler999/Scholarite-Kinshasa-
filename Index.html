<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarite Platinum | Unified Suite</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --gold: #D4AF37; /* Or Classique */
            --gold-light: #F9E58B;
            --bg: #050505; /* Noir profond */
            --panel: #111111;
            --text: #FFFFFF;
            --border: rgba(212, 175, 55, 0.2);
            --success: #10B981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR LUXE --- */
        .sidebar { 
            width: 280px; background: #000; border-right: 1px solid var(--border); 
            padding: 30px; display: flex; flex-direction: column; 
        }
        .logo-area { 
            margin-bottom: 50px; display: flex; align-items: center; gap: 15px; 
        }
        .logo-box { 
            width: 45px; height: 45px; background: linear-gradient(135deg, var(--gold), #8A6D3B); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            font-family: 'Playfair Display', serif; font-size: 24px; color: #000; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .nav-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; }
        .nav-link { 
            padding: 14px; border-radius: 12px; color: #888; cursor: pointer; 
            display: flex; align-items: center; gap: 12px; margin-bottom: 8px; transition: 0.4s; 
            border: 1px solid transparent;
        }
        .nav-link:hover { color: var(--gold); background: rgba(212, 175, 55, 0.05); }
        .nav-link.active { 
            background: rgba(212, 175, 55, 0.1); color: var(--gold); border-color: var(--border); 
        }

        /* --- MAIN VIEW --- */
        .main-view { flex-grow: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #111, #050505); }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header-top h1 { font-family: 'Playfair Display', serif; font-size: 28px; letter-spacing: -0.5px; }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { 
            background: var(--panel); padding: 25px; border-radius: 24px; 
            border: 1px solid var(--border); position: relative; overflow: hidden;
        }
        .stat-card::after { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; 
            background: linear-gradient(90deg, transparent, var(--gold), transparent); 
        }
        .stat-card h3 { font-size: 22px; margin-top: 10px; color: var(--gold); }

        /* --- CONTENU --- */
        .workspace { 
            background: var(--panel); border-radius: 30px; border: 1px solid var(--border); 
            padding: 35px; min-height: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: var(--gold); font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; }

        /* --- BOUTONS --- */
        .btn { 
            padding: 12px 24px; border-radius: 12px; border: none; font-weight: 700; 
            cursor: pointer; transition: 0.3s; font-size: 12px; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { background: var(--gold-light); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--gold); }

        /* --- MODAL --- */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 100; 
        }
        .modal-box { 
            background: #000; padding: 40px; border-radius: 30px; width: 480px; 
            border: 1px solid var(--gold); box-shadow: 0 0 50px rgba(212, 175, 55, 0.1);
        }
        input, select { 
            width: 100%; padding: 15px; background: #111; color: white; 
            border-radius: 12px; border: 1px solid var(--border); margin-top: 8px; outline: none;
        }
        input:focus { border-color: var(--gold); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area">
            <div class="logo-box">P</div>
            <div>
                <h2 style="font-size: 18px; letter-spacing: 1px;">PLATINUM</h2>
                <small style="color: var(--gold); font-weight: 800; font-size: 9px; text-transform: uppercase;">Excellence Scolaire</small>
            </div>
        </div>

        <span class="nav-label">Gestion</span>
        <div class="nav-link active" onclick="loadModule('compta')"><i class="fa-solid fa-coins"></i> Finances</div>
        <div class="nav-link" onclick="loadModule('pedagogie')"><i class="fa-solid fa-graduation-cap"></i> Pédagogie</div>
        <div class="nav-link" onclick="loadModule('direction')"><i class="fa-solid fa-crown"></i> Direction</div>
        
        <span class="nav-label" style="margin-top: 30px;">Sécurité</span>
        <div class="nav-link" onclick="loadModule('security')"><i class="fa-solid fa-shield-halved"></i> Refoulement</div>

        <div style="margin-top: auto; padding: 20px; background: rgba(212,175,55,0.03); border-radius: 15px; border: 1px solid var(--border);">
            <p id="db-status" style="font-size: 11px;"><i class="fa-solid fa-circle-dot" style="color: #666"></i> Synchronisation...</p>
        </div>
    </aside>

    <main class="main-view">
        <header class="header-top">
            <h1 id="module-title">Tableau de Bord</h1>
            <div style="display: flex; gap: 15px;">
                <button class="btn btn-outline" onclick="refreshAll()"><i class="fa-solid fa-rotate"></i> Sync</button>
                <button class="btn btn-gold"><i class="fa-solid fa-user"></i> Admin</button>
            </div>
        </header>

        <div class="stat-grid">
            <div class="stat-card"><small>CAISSE TOTALE</small><h3 id="stat-caisse">0.00 $</h3></div>
            <div class="stat-card"><small>VALIDATION NOTES</small><h3 id="stat-notes">0%</h3></div>
            <div class="stat-card"><small>EFFECTIF TOTAL</small><h3 id="stat-total">0</h3></div>
            <div class="stat-card"><small>ALERTES</small><h3 style="color: var(--gold-light)">Active</h3></div>
        </div>

        <section class="workspace" id="module-content">
            </section>
    </main>
    <div class="modal-overlay" id="main-modal">
        <div class="modal-box" id="modal-container">
            </div>
    </div>

    <script>
        // --- CONFIGURATION SUPABASE (PLATINUM) ---
        const SB_URL = "https://chpydetdbfugwwhsvgin.supabase.co"; 
        const SB_KEY = "sb_publishable_G3rNGdnIihPNVfaLj1C4VQ_1TUBFh_z"; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let dataStore = {
            eleves: [],
            evaluations: [],
            finances: [],
            currentModule: 'compta'
        };

        window.onload = async () => {
            await refreshAll();
            loadModule('compta');
        };

        // --- SYNCHRONISATION GLOBALE ---
        async function refreshAll() {
            const dbStatus = document.getElementById('db-status');
            try {
                // Récupération multi-tables
                const { data: st } = await _supabase.from('students').select('*').order('name');
                const { data: ev } = await _supabase.from('evaluations').select('*');
                const { data: fn } = await _supabase.from('finances').select('*');

                dataStore.eleves = st || [];
                dataStore.evaluations = ev || [];
                dataStore.finances = fn || [];

                updateGlobalStats();
                updateModuleUI();
                
                dbStatus.innerHTML = '<i class="fa-solid fa-circle" style="color:var(--gold)"></i> Système Synchronisé';
            } catch (e) {
                dbStatus.innerHTML = '<i class="fa-solid fa-circle" style="color:var(--danger)"></i> Erreur de liaison';
            }
        }

        function updateGlobalStats() {
            // Caisse
            const total = dataStore.finances.reduce((s, f) => s + parseFloat(f.montant_paye), 0);
            document.getElementById('stat-caisse').innerText = total.toFixed(2) + " $";
            
            // Notes
            const sealed = dataStore.evaluations.filter(e => e.is_sealed).length;
            const perc = dataStore.evaluations.length > 0 ? Math.round((sealed / dataStore.evaluations.length)*100) : 0;
            document.getElementById('stat-notes').innerText = perc + "%";
            
            // Effectif
            document.getElementById('stat-total').innerText = dataStore.eleves.length;
        }

        // --- SYSTÈME DE NAVIGATION ---
        function loadModule(mod) {
            dataStore.currentModule = mod;
            const content = document.getElementById('module-content');
            const title = document.getElementById('module-title');
            
            // Update Sidebar
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const activeLink = Array.from(document.querySelectorAll('.nav-link')).find(l => l.innerText.toLowerCase().includes(mod === 'compta' ? 'finances' : mod === 'pedagogie' ? 'pédagogie' : mod));
            if(activeLink) activeLink.classList.add('active');

            if(mod === 'compta') {
                title.innerHTML = 'Gestion des <span style="color:var(--gold)">Finances</span>';
                content.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                        <h2 style="font-size:18px;">Journal de Caisse</h2>
                        <button class="btn btn-gold" onclick="openPaymentModal()"><i class="fa-solid fa-plus"></i> Nouvel Encaissement</button>
                    </div>
                    <table>
                        <thead><tr><th>ÉLÈVE</th><th>CLASSE</th><th>DATE</th><th>MONTANT</th><th>RECU</th></tr></thead>
                        <tbody id="compta-rows"></tbody>
                    </table>
                `;
                renderCompta();
            } 
            else if(mod === 'pedagogie') {
                title.innerHTML = 'Contrôle <span style="color:var(--gold)">Pédagogique</span>';
                content.innerHTML = `
                    <h2 style="font-size:18px; margin-bottom:30px;">Scellement des Points</h2>
                    <table>
                        <thead><tr><th>PROFESSEUR</th><th>MATIÈRE</th><th>CLASSE</th><th>STATUT</th><th>ACTION</th></tr></thead>
                        <tbody id="pedago-rows"></tbody>
                    </table>
                `;
                renderPedagogie();
            }
            else if(mod === 'security') {
                title.innerHTML = 'Terminal <span style="color:var(--gold)">Refoulement</span>';
                content.innerHTML = `
                    <div style="text-align:center; padding:50px;">
                        <i class="fa-solid fa-shield-halved" style="font-size:50px; color:var(--gold); margin-bottom:20px;"></i>
                        <h2>ALERTE REFOULEMENT ACTIVE</h2>
                        <p style="color:#666; margin-top:10px;">Protocole d'exclusion temporaire pour insolvabilité.</p>
                        <input type="text" placeholder="Scanner un nom ou matricule..." style="max-width:400px; margin-top:30px; text-align:center; border-color:var(--gold);">
                    </div>
                `;
            }
        }

        // --- RENDERING DES MODULES ---
        function renderCompta() {
            const rows = document.getElementById('compta-rows');
            rows.innerHTML = dataStore.finances.map(f => `
                <tr>
                    <td><b>${f.nom_eleve}</b></td>
                    <td>${f.motif_paiement || 'Scolarité'}</td>
                    <td style="color:#666">${new Date(f.created_at).toLocaleDateString()}</td>
                    <td style="color:var(--gold); font-weight:800;">${parseFloat(f.montant_paye).toFixed(2)} $</td>
                    <td><button class="btn btn-outline" style="padding:5px 10px;" onclick="printReceipt('${f.nom_eleve}', ${f.montant_paye})"><i class="fa-solid fa-file-pdf"></i></button></td>
                </tr>
            `).join('');
        }

        function renderPedagogie() {
            const rows = document.getElementById('pedago-rows');
            rows.innerHTML = dataStore.evaluations.map(ev => `
                <tr>
                    <td>Prof. ${ev.prof_name}</td>
                    <td>${ev.subject}</td>
                    <td>${ev.class_id}</td>
                    <td><span style="color:${ev.is_sealed ? 'var(--success)' : 'var(--gold)'}">${ev.is_sealed ? 'SCELLÉ' : 'EN ATTENTE'}</span></td>
                    <td>${!ev.is_sealed ? `<button class="btn btn-gold" onclick="sealGrades('${ev.id}')">SCELLER</button>` : '<i class="fa-solid fa-lock"></i>'}</td>
                </tr>
            `).join('');
        }

        // --- ACTIONS ---
        function openPaymentModal() {
            const modal = document.getElementById('main-modal');
            const container = document.getElementById('modal-container');
            modal.style.display = 'flex';
            container.innerHTML = `
                <h2 style="color:var(--gold); margin-bottom:20px;">Nouvel Encaissement</h2>
                <label>SÉLECTIONNER ÉLÈVE</label>
                <select id="pay-id">${dataStore.eleves.map(e => `<option value="${e.id}">${e.name}</option>`).join('')}</select>
                <label style="margin-top:20px; display:block;">MONTANT (USD)</label>
                <input type="number" id="pay-val" placeholder="0.00">
                <div style="display:flex; gap:10px; margin-top:30px;">
                    <button class="btn btn-gold" style="flex:1" onclick="submitPayment()">VALIDER</button>
                    <button class="btn btn-outline" style="flex:1" onclick="closeModal()">FERMER</button>
                </div>
            `;
        }

        async function submitPayment() {
            const id = document.getElementById('pay-id').value;
            const val = document.getElementById('pay-val').value;
            const student = dataStore.eleves.find(e => e.id === id);

            if(!val) return;

            const { error } = await _supabase.from('finances').insert([
                { eleve_id: id, nom_eleve: student.name, montant_paye: val }
            ]);

            if(!error) {
                closeModal();
                refreshAll();
            }
        }

        async function sealGrades(id) {
            await _supabase.from('evaluations').update({ is_sealed: true }).eq('id', id);
            refreshAll();
        }

        function closeModal() { document.getElementById('main-modal').style.display = 'none'; }
        
        function updateModuleUI() {
            if(dataStore.currentModule === 'compta') renderCompta();
            if(dataStore.currentModule === 'pedagogie') renderPedagogie();
        }

        function printReceipt(name, amount) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFont("helvetica", "bold");
            doc.text("PLATINUM SCHOOL SYSTEM", 105, 20, {align: 'center'});
            doc.line(20, 25, 190, 25);
            doc.text(`RECU DE PAIEMENT : ${amount} $`, 20, 40);
            doc.setFont("helvetica", "normal");
            doc.text(`Élève : ${name}`, 20, 55);
            doc.text(`Date : ${new Date().toLocaleDateString()}`, 20, 65);
            doc.text(`Frais d'études / Session 2026`, 20, 75);
            doc.save(`Recu_${name}.pdf`);
        }
    </script>
</body>
</html>
