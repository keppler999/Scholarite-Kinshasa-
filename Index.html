<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLATINUM ERP | Unified System</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --gold: #D4AF37;
            --gold-dark: #8A6D3B;
            --bg: #050505;
            --panel: #111111;
            --text: #FFFFFF;
            --border: rgba(212, 175, 55, 0.15);
            --success: #10B981;
            --danger: #EF4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: 280px; background: #000; border-right: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; z-index: 10; }
        .logo-area { margin-bottom: 50px; display: flex; align-items: center; gap: 15px; }
        .logo-box { width: 45px; height: 45px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 24px; color: #000; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }

        .nav-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 10px 0; display: block; }
        .nav-link { padding: 14px; border-radius: 12px; color: #888; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 5px; transition: 0.3s; border: 1px solid transparent; }
        .nav-link:hover { color: var(--gold); background: rgba(212, 175, 55, 0.05); }
        .nav-link.active { background: rgba(212, 175, 55, 0.1); color: var(--gold); border-color: var(--border); }

        /* --- MAIN CONTENT --- */
        .main-view { flex-grow: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at 50% 0%, #151515 0%, #050505 100%); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header-top h1 { font-family: 'Playfair Display', serif; font-size: 32px; }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--panel); padding: 25px; border-radius: 24px; border: 1px solid var(--border); }
        .stat-card h3 { font-size: 24px; margin-top: 10px; color: var(--gold); font-weight: 800; }

        .workspace { background: var(--panel); border-radius: 32px; border: 1px solid var(--border); padding: 35px; min-height: 500px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        
        /* --- TABLES --- */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: var(--gold); font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; color: #ccc; }
        tr:hover td { color: #fff; background: rgba(255,255,255,0.01); }

        /* --- BUTTONS & INPUTS --- */
        .btn { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 12px; display: inline-flex; align-items: center; gap: 8px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--gold); }
        .btn:active { transform: scale(0.95); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: #000; padding: 40px; border-radius: 30px; width: 500px; border: 1px solid var(--gold); }
        
        select, input { width: 100%; padding: 15px; background: #111; color: #fff; border-radius: 12px; border: 1px solid var(--border); margin-top: 10px; }

        #toast { position: fixed; bottom: 30px; right: 30px; background: var(--gold); color: #000; padding: 15px 30px; border-radius: 12px; font-weight: 800; display: none; z-index: 2000; }
    </style>
</head>
<body>

    <div id="toast">ACTION RÉUSSIE</div>

    <aside class="sidebar">
        <div class="logo-area">
            <div class="logo-box">P</div>
            <div>
                <h2 style="font-size: 18px; letter-spacing: 1px;">PLATINUM</h2>
                <small style="color: var(--gold); font-weight: 800; font-size: 9px;">ARCHITECTURE UNIFIÉE</small>
            </div>
        </div>

        <span class="nav-label">OPÉRATIONS</span>
        <div class="nav-link active" onclick="loadModule('compta')"><i class="fa-solid fa-vault"></i> Finance & Caisse</div>
        <div class="nav-link" onclick="loadModule('pedagogie')"><i class="fa-solid fa-scroll"></i> Pédagogie</div>
        <div class="nav-link" onclick="loadModule('direction')"><i class="fa-solid fa-tie"></i> Direction</div>
        
        <span class="nav-label">SÉCURITÉ</span>
        <div class="nav-link" onclick="loadModule('security')"><i class="fa-solid fa-door-closed"></i> Canal Refoulement</div>

        <div style="margin-top: auto; padding: 20px; background: rgba(212,175,55,0.05); border-radius: 20px; border: 1px solid var(--border);">
            <p id="db-status" style="font-size: 11px;"><i class="fa-solid fa-wifi"></i> Liaison Supabase...</p>
        </div>
    </aside>

    <main class="main-view">
        <header class="header-top">
            <h1 id="module-title">CHARGEMENT...</h1>
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-outline" onclick="refreshAll()"><i class="fa-solid fa-sync-alt"></i> SYNC</button>
                <button class="btn btn-gold" id="user-role">ADMIN</button>
            </div>
        </header>

        <div class="stat-grid">
            <div class="stat-card"><small>SOLDE CAISSE</small><h3 id="stat-caisse">0.00 $</h3></div>
            <div class="stat-card"><small>SCELLÉS / ÉVALS</small><h3 id="stat-notes">0 / 0</h3></div>
            <div class="stat-card"><small>EFFECTIF ÉLÈVES</small><h3 id="stat-total">0</h3></div>
            <div class="stat-card"><small>STATUT SYSTÈME</small><h3 style="color:var(--success)">OPÉRATIONNEL</h3></div>
        </div>

        <section class="workspace" id="module-content">
            </section>
    </main>

    <div class="modal-overlay" id="main-modal">
        <div class="modal-box" id="modal-body"></div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SB_URL = "https://chpydetdbfugwwhsvgin.supabase.co"; 
        const SB_KEY = "sb_publishable_G3rNGdnIihPNVfaLj1C4VQ_1TUBFh_z"; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let store = { eleves: [], evaluations: [], finances: [], current: 'compta' };

        window.onload = () => { refreshAll(); loadModule('compta'); };

        async function refreshAll() {
            try {
                const { data: st } = await _supabase.from('students').select('*').order('name');
                const { data: ev } = await _supabase.from('evaluations').select('*');
                const { data: fn } = await _supabase.from('finances').select('*');

                store.eleves = st || [];
                store.evaluations = ev || [];
                store.finances = fn || [];

                updateStats();
                updateUI();
                document.getElementById('db-status').innerHTML = '<i class="fa-solid fa-circle" style="color:var(--gold)"></i> SYSTÈME CONNECTÉ';
            } catch (e) { console.error(e); }
        }

        function updateStats() {
            const total = store.finances.reduce((s, f) => s + parseFloat(f.montant_paye), 0);
            const sealed = store.evaluations.filter(e => e.is_sealed).length;
            
            document.getElementById('stat-caisse').innerText = total.toFixed(2) + " $";
            document.getElementById('stat-notes').innerText = `${sealed} / ${store.evaluations.length}`;
            document.getElementById('stat-total').innerText = store.eleves.length;
        }

        function loadModule(mod) {
            store.current = mod;
            const content = document.getElementById('module-content');
            const title = document.getElementById('module-title');
            
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event?.target?.closest('.nav-link')?.classList.add('active');

            if (mod === 'compta') {
                title.innerText = "FINANCE & TRESORERIE";
                content.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                        <h2>Journal des Encaissements</h2>
                        <button class="btn btn-gold" onclick="openPayModal()">NOUVEL ENCAISSEMENT</button>
                    </div>
                    <table>
                        <thead><tr><th>ÉLÈVE</th><th>MOTIF</th><th>MONTANT</th><th>DATE</th><th>ACTION</th></tr></thead>
                        <tbody id="rows-fin"></tbody>
                    </table>`;
                renderFin();
            } 
            else if (mod === 'pedagogie') {
                title.innerText = "CONTRÔLE DES COTES";
                content.innerHTML = `
                    <h2>Grilles de points soumises</h2>
                    <table>
                        <thead><tr><th>PROFESSEUR</th><th>CLASSE</th><th>MATIÈRE</th><th>STATUT</th><th>ACTION</th></tr></thead>
                        <tbody id="rows-ped"></tbody>
                    </table>`;
                renderPed();
            }
            else if (mod === 'security') {
                title.innerText = "TERMINAL DE REFOULEMENT";
                content.innerHTML = `
                    <div style="text-align:center; padding:60px 0;">
                        <i class="fa-solid fa-ban" style="font-size:60px; color:var(--gold); margin-bottom:20px;"></i>
                        <h1 style="color:var(--gold)">ALERTE REFOULEMENT ACTIVE</h1>
                        <p style="color:#666; margin:15px 0 30px;">Recherche instantanée dans la base de données Platinum</p>
                        <input type="text" id="search-ref" onkeyup="searchRef()" placeholder="Taper nom ou matricule pour vérification..." style="max-width:500px; text-align:center; border-color:var(--gold);">
                        <div id="ref-result" style="margin-top:40px;"></div>
                    </div>`;
            }
        }

        function renderFin() {
            document.getElementById('rows-fin').innerHTML = store.finances.map(f => `
                <tr>
                    <td><b>${f.nom_eleve}</b></td>
                    <td>Scolarité</td>
                    <td style="color:var(--gold); font-weight:800">${parseFloat(f.montant_paye).toFixed(2)} $</td>
                    <td>${new Date(f.created_at).toLocaleDateString()}</td>
                    <td><button class="btn btn-outline" style="padding:5px 10px" onclick="pdfRecu('${f.nom_eleve}', ${f.montant_paye})">PDF</button></td>
                </tr>`).join('');
        }

        function renderPed() {
            document.getElementById('rows-ped').innerHTML = store.evaluations.map(e => `
                <tr>
                    <td>Prof. ${e.prof_name}</td>
                    <td>${e.class_id}</td>
                    <td>${e.subject}</td>
                    <td><span style="color:${e.is_sealed ? 'var(--success)' : 'var(--gold)'}">${e.is_sealed ? 'SCELLÉ' : 'EN ATTENTE'}</span></td>
                    <td>${!e.is_sealed ? `<button class="btn btn-gold" onclick="seal('${e.id}')">SCELLER</button>` : '<i class="fa-solid fa-lock"></i>'}</td>
                </tr>`).join('');
        }

        async function seal(id) {
            await _supabase.from('evaluations').update({ is_sealed: true }).eq('id', id);
            showToast("GRILLE SCELLÉE");
            refreshAll();
        }

        function openPayModal() {
            const m = document.getElementById('main-modal');
            document.getElementById('modal-body').innerHTML = `
                <h2 style="color:var(--gold); margin-bottom:25px;">Encaissement Frais</h2>
                <label>CHOISIR ÉLÈVE</label>
                <select id="p-id">${store.eleves.map(e => `<option value="${e.id}">${e.name}</option>`).join('')}</select>
                <label style="display:block; margin-top:20px;">MONTANT USD</label>
                <input type="number" id="p-amt" placeholder="0.00">
                <div style="display:flex; gap:10px; margin-top:30px;">
                    <button class="btn btn-gold" style="flex:1" onclick="doPay()">VALIDER</button>
                    <button class="btn btn-outline" style="flex:1" onclick="closeM()">ANNULER</button>
                </div>`;
            m.style.display = 'flex';
        }

        async function doPay() {
            const id = document.getElementById('p-id').value;
            const amt = document.getElementById('p-amt').value;
            const eleve = store.eleves.find(e => e.id === id);
            
            await _supabase.from('finances').insert([{ eleve_id: id, nom_eleve: eleve.name, montant_paye: amt }]);
            closeM();
            showToast("PAIEMENT ENREGISTRÉ");
            refreshAll();
        }

        function searchRef() {
            const q = document.getElementById('search-ref').value.toLowerCase();
            const res = document.getElementById('ref-result');
            if(!q) { res.innerHTML = ""; return; }
            
            const match = store.eleves.find(e => e.name.toLowerCase().includes(q));
            if(match) {
                const paye = store.finances.filter(f => f.eleve_id === match.id).reduce((s,f) => s + parseFloat(f.montant_paye), 0);
                res.innerHTML = `
                    <div style="padding:30px; border-radius:20px; background:rgba(255,255,255,0.02); border:1px solid ${paye > 0 ? 'var(--success)' : 'var(--danger)'}">
                        <h2 style="color:#fff">${match.name}</h2>
                        <h1 style="font-size:48px; margin:15px 0; color:${paye > 0 ? 'var(--success)' : 'var(--danger)'}">
                            ${paye > 0 ? 'AUTORISÉ' : 'REFOULEMENT'}
                        </h1>
                        <p>Total payé : ${paye.toFixed(2)} $</p>
                    </div>`;
            } else { res.innerHTML = "Aucun élève trouvé."; }
        }

        function updateUI() {
            if(store.current === 'compta') renderFin();
            if(store.current === 'pedagogie') renderPed();
        }

        function closeM() { document.getElementById('main-modal').style.display = 'none'; }
        
        function showToast(txt) {
            const t = document.getElementById('toast');
            t.innerText = txt; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function pdfRecu(name, amt) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFont("helvetica", "bold");
            doc.text("PLATINUM SYSTEM - RECU", 105, 30, {align:'center'});
            doc.text(`MONTANT : ${amt} USD`, 20, 60);
            doc.setFont("helvetica", "normal");
            doc.text(`Nom : ${name}`, 20, 75);
            doc.text(`Date : ${new Date().toLocaleDateString()}`, 20, 85);
            doc.save(`Recu_${name}.pdf`);
        }
    </script>
</body>
</html>
